<svg viewBox="0 0 600 760" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6f1ff"/>
      <stop offset="0.55" stop-color="#9ec4fb"/>
      <stop offset="1" stop-color="#6aa2f2"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5fa0f7"/>
      <stop offset="1" stop-color="#3f7fe6"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="600" height="760" fill="url(#bg)"/>

  <!-- decorative -->
  <g stroke="#ffffff" stroke-width="2" fill="none" opacity="0.45" stroke-linecap="round">
    <path d="M470 60 L470 180" opacity="0.6"/>
    <path d="M508 40 L508 150" opacity="0.4"/>
    <path d="M546 66 L546 156" opacity="0.5"/>
  </g>
  <circle cx="110" cy="120" r="92" fill="#ffffff" opacity="0.12"/>
  <circle cx="512" cy="648" r="130" fill="#ffffff" opacity="0.10"/>

  <!-- soft shadow under the card -->
  <ellipse cx="300" cy="540" rx="150" ry="30" fill="#2b64c4" opacity="0.35" filter="url(#soft)"/>

  <!-- card -->
  <rect x="176" y="250" width="248" height="248" rx="46" fill="url(#card)"/>
  <rect x="176" y="250" width="248" height="92" rx="46" fill="#ffffff" opacity="0.10"/>

  <!-- car (white) centered on the card -->
  <g>
    <path d="M254 394 L276 358 Q280 352 288 352 L312 352 Q320 352 324 358 L346 394 Z" fill="#ffffff"/>
    <path d="M283 361 L269 391 L297 391 L297 361 Z" fill="#8fbcf7"/>
    <path d="M303 361 L303 391 L331 391 L317 361 Z" fill="#8fbcf7"/>
    <rect x="214" y="392" width="172" height="42" rx="16" fill="#ffffff"/>
    <rect x="372" y="404" width="12" height="8" rx="3" fill="#ffd66b"/>
    <circle cx="252" cy="438" r="18" fill="#1f3a63"/>
    <circle cx="252" cy="438" r="7" fill="#cdd9ec"/>
    <circle cx="348" cy="438" r="18" fill="#1f3a63"/>
    <circle cx="348" cy="438" r="7" fill="#cdd9ec"/>
  </g>

  <!-- green check badge -->
  <g transform="translate(402,262)">
    <circle r="28" fill="#22c55e"/>
    <path d="M-11 1 L-4 9 L11 -8" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
